<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../static/transparent.svg" type="image/svg+xml">
    <title>Calendar</title>
    <link rel="stylesheet" href="../static/css_/base.css">
    <link rel="stylesheet" href="../static/css_/sidebar.css">
    <link rel="stylesheet" href="../static/css_/buttons.css">
    <link rel="stylesheet" href="../static/css_/forms.css">
    <link rel="stylesheet" href="../static/css_/cards.css">
    <link rel="stylesheet" href="../static/css_/pages.css">
    <link rel="stylesheet" href="../static/css_/calendar-page.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="../static/css_/flatpickr-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calendar-wrapper">
        <!-- Calendar Header -->
        <div class="calendar-header">
            <div class="calendar-header-left">
                <button class="btn-calendar-home" onclick="goHome()" title="Home">Home</button>
                <button class="btn-calendar-today" onclick="goToToday()">Today</button>
                <button class="btn-calendar-nav" onclick="navigatePrev()" title="Previous">&#8249;</button>
                <button class="btn-calendar-nav" onclick="navigateNext()" title="Next">&#8250;</button>
                <span class="calendar-current-period" id="currentPeriod"></span>
            </div>
            <div class="calendar-header-right">
                <button class="left-btn-icon-toggle" onclick="toggleTheme()" id="themeToggleBtn" title="Toggle theme">
                    <svg id="themeIconSun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="themeIconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <div class="calendar-view-toggle">
                    <button class="view-btn active" id="weekViewBtn" onclick="switchView('week')">Week</button>
                    <button class="view-btn" id="monthViewBtn" onclick="switchView('month')">Month</button>
                </div>
            </div>
        </div>

        <!-- Calendar Body (rendered by JS) -->
        <div class="calendar-body" id="calendarBody"></div>
    </div>

    <!-- Lesson Detail Modal -->
    <div class="modal" id="lessonDetailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="lessonDetailTitle">Lesson Details</h3>
                <button class="btn-close" onclick="closeModalUrl('event')">×</button>
            </div>
            <div id="lessonDetailContent"></div>
        </div>
    </div>

    <!-- Book Lesson Modal -->
    <div class="modal" id="bookLessonModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Book Lesson</h3>
                <button class="btn-close" onclick="closeBookLessonModal()">×</button>
            </div>
            <form onsubmit="bookLesson(event)">
                <div class="form-group">
                    <label class="form-label">Student</label>
                    <input type="hidden" id="bookStudentSelect" value="">
                    <div class="custom-select" data-target="bookStudentSelect">
                        <div class="custom-select-trigger">Select student...</div>
                        <div class="custom-select-options"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Date</label>
                    <input type="text" class="form-input" id="bookDateInput" required placeholder="Select date...">
                </div>
                <div class="form-group">
                    <label class="form-label">Start Time</label>
                    <input type="text" class="form-input" id="bookStartTimeInput" required placeholder="Select time...">
                </div>
                <div class="form-group">
                    <label class="form-label">Duration</label>
                    <input type="hidden" id="bookDurationSelect" value="60">
                    <div class="custom-select" data-target="bookDurationSelect">
                        <div class="custom-select-trigger">60 min</div>
                        <div class="custom-select-options">
                            <div class="custom-select-option" data-value="30">30 min</div>
                            <div class="custom-select-option" data-value="45">45 min</div>
                            <div class="custom-select-option selected" data-value="60">60 min</div>
                            <div class="custom-select-option" data-value="90">90 min</div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Color</label>
                    <div class="color-picker-row" id="bookColorPicker">
                        <button type="button" class="color-pick-btn active" data-color="blue" onclick="selectBookingColor('blue')">
                            <span class="color-pick-swatch color-swatch-blue"></span> Blue
                        </button>
                        <button type="button" class="color-pick-btn" data-color="green" onclick="selectBookingColor('green')">
                            <span class="color-pick-swatch color-swatch-green"></span> Green
                        </button>
                        <button type="button" class="color-pick-btn" data-color="pink" onclick="selectBookingColor('pink')">
                            <span class="color-pick-swatch color-swatch-pink"></span> Pink
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Recurrence</label>
                    <input type="hidden" id="bookRecurrenceSelect" value="none">
                    <div class="custom-select" data-target="bookRecurrenceSelect">
                        <div class="custom-select-trigger">One-time</div>
                        <div class="custom-select-options">
                            <div class="custom-select-option selected" data-value="none">One-time</div>
                            <div class="custom-select-option" data-value="weekly">Every week</div>
                            <div class="custom-select-option" data-value="biweekly">Every 2 weeks</div>
                            <div class="custom-select-option" data-value="monthly">Every month</div>
                        </div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeBookLessonModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Book</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="../static/js/utils/api.js"></script>
    <script src="../static/js/utils/dom.js"></script>
    <script src="../static/js/utils/helpers.js"></script>
    <script src="../static/js/utils/modalUrl.js"></script>
    <script src="../static/js/components/modal.js"></script>
    <script src="../static/js/components/sidebar.js"></script>
    <script src="../static/js/components/topics.js"></script>
    <script src="../static/js/components/vocabulary.js"></script>
    <script src="../static/js/pages/calendar.js"></script>
</body>
</html>
