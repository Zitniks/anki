<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../static/transparent.svg" type="image/svg+xml">
    <title>Repeat</title>
    <link rel="stylesheet" href="../static/css_/base.css">
    <link rel="stylesheet" href="../static/css_/sidebar.css">
    <link rel="stylesheet" href="../static/css_/buttons.css">
    <link rel="stylesheet" href="../static/css_/forms.css">
    <link rel="stylesheet" href="../static/css_/pages.css">
    <link rel="stylesheet" href="../static/css_/repeat-page.css">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container repeat-page">
        <!-- Left Sidebar -->
        {% include 'partials/left_sidebar.html' %}

        <!-- Main Content -->
        <div class="main-content">

            <!-- Floating sidebar toggles -->
            <div class="float-toggle-left">
                <button class="float-toggle-btn" onclick="toggleLeftSidebar()" title="Toggle sidebar">
                    <svg width="18" height="18" fill="none" viewBox="0 0 20 20">
                        <rect x="2" y="3" width="16" height="14" rx="2.5" stroke="currentColor" stroke-width="1.3"/>
                        <path d="M7.5 3v14" stroke="currentColor" stroke-width="1.3"/>
                    </svg>
                </button>
            </div>
            <div class="float-toggle-right">
                <button class="float-toggle-btn" onclick="toggleRightSidebar()" title="Toggle panel">
                    <svg width="18" height="18" fill="none" viewBox="0 0 20 20">
                        <rect x="2" y="3" width="16" height="14" rx="2.5" stroke="currentColor" stroke-width="1.3"/>
                        <path d="M12.5 3v14" stroke="currentColor" stroke-width="1.3"/>
                    </svg>
                </button>
            </div>

            <!-- Scrollable content -->
            <div class="repeat-scroll-area">
                <div class="repeat-max-width">

                    <!-- Page Header -->
                    <div class="repeat-page-header">
                        <div>
                            <h1 class="repeat-page-title">Повторение</h1>
                            <!-- <p class="repeat-subtitle">
                                <span id="repeatStudentName"></span> — <span id="repeatProgress">0 of 0 completed</span>
                            </p> -->
                        </div>
                        <button class="btn-add-repeat" onclick="openAddModal()">
                            <svg width="15" height="15" fill="none" viewBox="0 0 16 16">
                                <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                            </svg>
                            Add item
                        </button>
                    </div>

                    <!-- Filter tabs -->
                    <div class="level-filter repeat-filter-tabs">
                        <button class="level-btn repeat-filter-tab active" data-filter="all">All</button>
                        <button class="level-btn repeat-filter-tab" data-filter="todo">To do</button>
                        <button class="level-btn repeat-filter-tab" data-filter="done">Done</button>
                    </div>

                    <!-- Legend -->
                    <!-- <div class="repeat-legend">
                        <div class="repeat-legend-item">
                            <span class="repeat-legend-dot todo"></span>
                            <span class="repeat-legend-label">Not done</span>
                        </div>
                        <div class="repeat-legend-item">
                            <span class="repeat-legend-dot done"></span>
                            <span class="repeat-legend-label">Completed</span>
                        </div>
                    </div> -->

                    <!-- Content -->
                    <div class="repeat-content" id="repeatContent">
                        <!-- Rendered by JS -->
                    </div>

                </div>
            </div>
        </div>

        {% include 'partials/right_sidebar.html' %}
    </div>

    <!-- Add/Edit Repeat Item Modal -->
    <div class="modal repeat-modal" id="addRepeatModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="addRepeatModalTitle">Add item</h3>
                <button class="btn-close" onclick="closeModalUrl('repeat'); closeAddModal();">&times;</button>
            </div>
            <form id="addRepeatForm" onsubmit="submitAddItem(event)">
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-input" id="repeatItemTitle" required placeholder="e.g. Grammar test — Present Perfect">
                </div>
                <div class="form-group">
                    <label class="form-label">Description (optional)</label>
                    <input type="text" class="form-input" id="repeatItemDesc" placeholder="e.g. Murphy Unit 7-8">
                </div>
                <div class="form-group">
                    <label class="form-label">Attachments</label>
                    <input type="file" id="repeatFileInput" onchange="handleRepeatFileSelect(event)" style="display:none" multiple>
                    <div class="repeat-dropzone" id="repeatDropzone">
                        <div class="repeat-dropzone-tiles" id="repeatDropzoneTiles">
                            <!-- File tiles + add tile rendered by JS -->
                        </div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModalUrl('repeat'); closeAddModal();">Cancel</button>
                    <button type="submit" class="btn-primary" id="addRepeatSubmitBtn">Add</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Adding Vocabulary -->
    <!-- Modal for Adding Vocabulary -->
    <div class="modal" id="addVocabularyModal">
        <div class="modal-content small">
            <div class="modal-header">
                <h3>Add Word</h3>
                <button class="btn-close" onclick="closeAddVocabularyModal()">×</button>
            </div>
            <form onsubmit="submitAddVocabulary(event)">
                <div class="form-group">
                    <input type="text" class="form-input" id="addVocabularyInput" required placeholder="Enter word or phrase...">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeAddVocabularyModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Add</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../static/js/utils/api.js"></script>
    <script src="../static/js/utils/dom.js"></script>
    <script src="../static/js/utils/helpers.js"></script>
    <script src="../static/js/utils/modalUrl.js"></script>
    <script src="../static/js/components/modal.js"></script>
    <script src="../static/js/components/sidebar.js"></script>
    <script src="../static/js/components/vocabulary.js"></script>
    <script src="../static/js/pages/repeat.js"></script>
</body>
</html>
