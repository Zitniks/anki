<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../static/transparent.svg" type="image/svg+xml">
    <title>Login — {{ app_name }}</title>
    <link rel="stylesheet" href="../static/css_/base.css">
    <link rel="stylesheet" href="../static/css_/buttons.css">
    <link rel="stylesheet" href="../static/css_/forms.css">
    <link rel="stylesheet" href="../static/css_/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1 class="login-title" id="loginTitle">Welcome back</h1>
            <p class="login-subtitle" id="loginSubtitle">Sign in to your account</p>

            <div class="login-error" id="loginError"></div>

            <form id="loginForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label class="form-label" for="emailInput">Email</label>
                    <input class="form-input" type="email" id="emailInput" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="passwordInput">Password</label>
                    <input class="form-input" type="password" id="passwordInput" placeholder="••••••••" required autocomplete="current-password" minlength="6">
                </div>
                <button type="submit" class="login-submit" id="submitBtn">Sign in</button>
            </form>

            <div class="login-toggle">
                <span id="toggleText">Don't have an account?</span>
                <a onclick="toggleMode()"><span id="toggleLink">Register</span></a>
            </div>
        </div>
    </div>

    <script src="../static/js/pages/login.js"></script>
</body>
</html>
