<!-- Shared Left Sidebar -->
<div class="left-sidebar" id="leftSidebar">
    <div class="sidebar-header">
        <div class="sidebar-header-top">
            <button class="left-btn-icon-home" onclick="goHome()" title="Home">
                <svg class="home-icon-svg" width="18" height="18" fill="none" viewBox="0 0 20 20"><path d="M3 10l7-7 7 7M5 8.5V16a1 1 0 001 1h3v-4h2v4h3a1 1 0 001-1V8.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <h3 class="home-title">Home</h3>
            </button>
            <div class="sidebar-header-actions">
                <button class="left-btn-icon-toggle" onclick="toggleLeftSidebar()" title="Toggle sidebar">
                    <svg width="18" height="18" fill="none" viewBox="0 0 20 20">
                        <rect x="2" y="3" width="16" height="14" rx="2.5" stroke="currentColor" stroke-width="1.3"/>
                        <path d="M7.5 3v14" stroke="currentColor" stroke-width="1.3"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Student Info (clickable to toggle nav) -->
    <div class="sidebar-student-info" id="sidebarStudentInfo" onclick="toggleSidebarNav()">
        <div class="sidebar-student-card-row">
            <div class="sidebar-student-avatar" id="sidebarStudentAvatar"></div>
            <div style="flex:1">
                <div class="sidebar-student-name" id="sidebarStudentName"></div>
                <div class="sidebar-student-level-badge" id="sidebarStudentLevel"></div>
            </div>
            <svg class="sidebar-student-chevron" width="14" height="14" fill="none" viewBox="0 0 16 16">
                <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="sidebar-student-description" id="sidebarStudentDescription"></div>
    </div>

    <!-- New Chat Button -->
    <div class="sidebar-new-chat-section">
        <button class="sidebar-nav-new-chat" onclick="createNewChatFromSidebar()" title="New Chat">
            <svg width="15" height="15" fill="none" viewBox="0 0 16 16"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            <span>New Chat</span>
        </button>
    </div>

    <!-- Collapsible Navigation -->
    <div class="sidebar-nav-collapse" id="sidebarNavCollapse">
    <nav class="sidebar-nav">
        <a class="sidebar-nav-item" data-nav="topics" onclick="goTopics(getSidebarProjectId())" title="Topics">
            <span class="nav-icon">
                <svg width="17" height="17" fill="none" viewBox="0 0 20 20"><path d="M2 3.5A1.5 1.5 0 0 1 3.5 2h5.586a1.5 1.5 0 0 1 1.06.44l7.415 7.414a1.5 1.5 0 0 1 0 2.121l-5.586 5.586a1.5 1.5 0 0 1-2.121 0L2.439 10.146A1.5 1.5 0 0 1 2 9.086V3.5Z" stroke="currentColor" stroke-width="1.4"/><circle cx="6" cy="6" r="1" fill="currentColor"/></svg>
            </span>
            <span>Topics</span>
        </a>
        <a class="sidebar-nav-item" data-nav="lesson" onclick="goToLessons(getSidebarProjectId())" title="Lessons">
            <span class="nav-icon">
                <svg width="17" height="17" fill="none" viewBox="0 0 20 20"><path d="M3 4.5A2.5 2.5 0 0 1 5.5 2H16a1 1 0 0 1 1 1v12.5a.5.5 0 0 1-.5.5H5.5A2.5 2.5 0 0 0 3 18.5m0-14v14" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            </span>
            <span>Lessons</span>
        </a>
        <a class="sidebar-nav-item" data-nav="repeat" onclick="goRepeat(getSidebarProjectId())" title="Repeat">
            <span class="nav-icon">
                <svg width="17" height="17" fill="none" viewBox="0 0 20 20"><path d="M14 2l3 3-3 3M6 18l-3-3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 5H7.5A4.5 4.5 0 0 0 3 9.5M3 15h9.5a4.5 4.5 0 0 0 4.5-4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </span>
            <span>Repeat</span>
        </a>
        <a class="sidebar-nav-item" data-nav="notes" onclick="openNotesPopup()" title="Notes">
            <span class="nav-icon">
                <svg width="17" height="17" fill="none" viewBox="0 0 20 20"><path d="M13.586 3.586a2 2 0 0 1 2.828 2.828L7.5 15.328 3 16.5l1.172-4.5 9.414-8.414Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            </span>
            <span>Notes</span>
        </a>
        <a class="sidebar-nav-item" data-nav="calendar" onclick="goCalendar()" title="Calendar">
            <span class="nav-icon">
                <svg width="17" height="17" fill="none" viewBox="0 0 20 20"><rect x="2" y="4" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M2 8h16M6 2v4M14 2v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </span>
            <span>Calendar</span>
        </a>
        <a class="sidebar-nav-item" data-nav="materials" onclick="goMaterials()" title="Materials">
            <span class="nav-icon">
                <svg width="17" height="17" fill="none" viewBox="0 0 20 20"><path d="M2 5.5A1.5 1.5 0 0 1 3.5 4H8l2 2h6.5A1.5 1.5 0 0 1 18 7.5v7a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 2 14.5v-9Z" stroke="currentColor" stroke-width="1.4"/></svg>
            </span>
            <span>Materials</span>
        </a>
        <a class="sidebar-nav-item" data-nav="attachments" onclick="goAttachments()" title="Attachments">
            <span class="nav-icon">
                <svg width="17" height="17" fill="none" viewBox="0 0 20 20"><path d="M15.5 10.2L10 15.7C8.3 17.4 5.5 17.4 3.8 15.7C2.1 14 2.1 11.2 3.8 9.5L10.6 2.7C11.7 1.6 13.5 1.6 14.6 2.7C15.7 3.8 15.7 5.6 14.6 6.7L8 13.3C7.4 13.9 6.5 13.9 5.9 13.3C5.3 12.7 5.3 11.8 5.9 11.2L11.5 5.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </span>
            <span>Attachments</span>
        </a>
    </nav>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Recent Chats -->
    <div class="sidebar-chats-section">
        <div class="sidebar-chats-header" onclick="toggleChatsSection()" style="cursor:pointer;" title="Toggle recent chats">
            <div style="display:flex;align-items:center;gap:6px;">
                <svg id="chatsSectionChevron" width="13" height="13" fill="none" viewBox="0 0 16 16" style="color:var(--text-tertiary);transition:transform 0.25s cubic-bezier(0.22,1,0.36,1);flex-shrink:0;"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span class="sidebar-chats-title">Recent chats</span>
            </div>
            <button class="btn-new-chat-small" onclick="event.stopPropagation();createNewChatFromSidebar()" title="New chat">
                <svg width="15" height="15" fill="none" viewBox="0 0 16 16"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </button>
        </div>
        <div class="sidebar-chats-list" id="sidebarChatsList"></div>
    </div>

</div>

<!-- Notes Popup Modal -->
<div class="modal" id="notesModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Notes</h3>
            <button class="btn-close" onclick="closeNotesPopup()">x</button>
        </div>
        <div class="notes-popup-body">
            <textarea
                class="notes-textarea"
                id="notesTextarea"
                placeholder="Add notes about the student..."
                oninput="onNotesInput()"
            ></textarea>
            <div class="notes-popup-actions">
                <button class="btn-primary btn-save-notes" id="saveNotesBtn" onclick="saveNotesFromSidebar()">
                    Save
                </button>
            </div>
        </div>
    </div>
</div>
