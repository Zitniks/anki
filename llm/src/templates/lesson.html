<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../static/transparent.svg" type="image/svg+xml">
    <title>Занятия студента</title>
    <link rel="stylesheet" href="../static/css_/base.css">
    <link rel="stylesheet" href="../static/css_/sidebar.css">
    <link rel="stylesheet" href="../static/css_/buttons.css">
    <link rel="stylesheet" href="../static/css_/forms.css">
    <link rel="stylesheet" href="../static/css_/cards.css">
    <link rel="stylesheet" href="../static/css_/pages.css">
    <link rel="stylesheet" href="../static/css_/lesson-page.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="../static/css_/flatpickr-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Lesson Page -->
    <div class="lesson-page" id="lessonPage">
        <div class="lesson-container">
            <!-- Left Sidebar -->
            {% include 'partials/left_sidebar.html' %}

            <!-- Main Content Area -->
            <div class="main-content-area">
                <!-- Floating sidebar toggles -->
                <div class="float-toggle-left">
                    <button class="float-toggle-btn" onclick="toggleLeftSidebar()" title="Toggle sidebar">
                        <svg width="18" height="18" fill="none" viewBox="0 0 20 20">
                            <rect x="2" y="3" width="16" height="14" rx="2.5" stroke="currentColor" stroke-width="1.3"/>
                            <path d="M7.5 3v14" stroke="currentColor" stroke-width="1.3"/>
                        </svg>
                    </button>
                </div>
                <div class="float-toggle-right">
                    <button class="float-toggle-btn" onclick="toggleRightSidebar()" title="Toggle panel">
                        <svg width="18" height="18" fill="none" viewBox="0 0 20 20">
                            <rect x="2" y="3" width="16" height="14" rx="2.5" stroke="currentColor" stroke-width="1.3"/>
                            <path d="M12.5 3v14" stroke="currentColor" stroke-width="1.3"/>
                        </svg>
                    </button>
                </div>
                <!-- Scrollable content -->
                <div class="content-scroll-area">
                    <div class="content-max-width">
                        <!-- Page Header -->
                        <div class="lesson-page-header">
                            <h1 class="lesson-page-title">История занятий</h1>
                            <button class="btn-add-lesson-float" onclick="openAddLessonModal()">
                                <svg width="15" height="15" fill="none" viewBox="0 0 16 16">
                                    <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                                </svg>
                                <span>Добавить занятие</span>
                            </button>
                        </div>

                        <!-- Table Header -->
                        <div class="lessons-table-header">
                            <div class="lesson-col-date">Дата</div>
                            <div class="lesson-col-content">Что изучали</div>
                        </div>

                        <!-- Lesson Rows -->
                        <div class="lessons-rows-container" id="lessonsRowsContainer">
                            <!-- Lessons will be rendered here as rows -->
                        </div>

                        <!-- Bottom spacing -->
                        <div class="lesson-bottom-spacing"></div>
                    </div>
                </div>
            </div>

            {% include 'partials/right_sidebar.html' %}
        </div>
    </div>

    <!-- Add Lesson Modal -->
    <div class="modal" id="addLessonModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Добавить новое занятие</span>
            </div>
            <form onsubmit="addLesson(event)">
                <div class="form-group">
                    <label class="form-label">Дата занятия</label>
                    <input type="text" class="form-input flatpickr-input" id="lessonDateInput" required placeholder="Select date...">
                </div>
                <div class="form-group">
                    <label class="form-label">Описание занятия</label>
                    <div class="rich-text-editor-wrapper">
                        <div class="rich-text-toolbar">
                            <button type="button" class="toolbar-btn" onclick="formatText('bold')" title="Жирный (Ctrl+B)">
                                <strong>B</strong>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="formatText('italic')" title="Курсив (Ctrl+I)">
                                <em>I</em>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="formatText('underline')" title="Подчеркнутый (Ctrl+U)">
                                <u>U</u>
                            </button>
                            <div class="toolbar-separator"></div>
                            <button type="button" class="toolbar-btn" onclick="formatText('highlight', 'green')" title="Успешно изучено">
                                <span class="highlight-green">✓</span>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="formatText('highlight', 'red')" title="Не получилось">
                                <span class="highlight-red">✗</span>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="formatText('highlight', 'orange')" title="Требует повторения">
                                <span class="highlight-orange">↻</span>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="formatText('highlight', 'blue')" title="Заметка">
                                <span class="highlight-blue">ℹ</span>
                            </button>
                            <div class="toolbar-separator"></div>
                            <button type="button" class="toolbar-btn" onclick="formatText('removeFormat')" title="Убрать форматирование">
                                🗑️
                            </button>
                        </div>
                        <div class="rich-text-editor"
                             id="lessonContentInput"
                             contenteditable="true"
                             placeholder="Что изучали на занятии..."
                             oninput="validateEditorContent()"></div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeAddLessonModal()">
                        Отмена
                    </button>
                    <button type="submit" class="btn-primary">
                        Добавить
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Adding Vocabulary -->
    <div class="modal" id="addItemModal">
        <div class="modal-content small">
            <div class="modal-header">
                <h3 id="addItemTitle">Add</h3>
                <button class="btn-close" onclick="closeAddItemModal()">×</button>
            </div>
            <form onsubmit="submitAddItem(event)">
                <div class="form-group">
                    <input type="text" class="form-input" id="addItemInput" required placeholder="Enter text...">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeAddItemModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Add</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="../static/js/utils/api.js"></script>
    <script src="../static/js/utils/dom.js"></script>
    <script src="../static/js/utils/helpers.js"></script>
    <script src="../static/js/utils/modalUrl.js"></script>
    <script src="../static/js/components/modal.js"></script>
    <script src="../static/js/components/sidebar.js"></script>
    <script src="../static/js/components/vocabulary.js"></script>
    <script src="../static/js/pages/lesson.js"></script>
</body>
</html>
